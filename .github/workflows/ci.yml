name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type Check
        run: npm run type-check

      # - name: Lint
      #   run: npm run lint

      - name: Run tests
        run: npm test

      - name: Publish to npm if version changed
        if: github.ref == 'refs/heads/main' && matrix.node == '22'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          # Check if this exact version is already published to the NPM registry
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "✅ Version $VERSION is already published to npm. Skipping."
          else
            echo "🚀 Publishing version $VERSION to npm..."
            
            # Extract the tag (e.g., 'dev') and publish with it if it's a pre-release version (e.g., 2.0.0-dev.1)
            if [[ "$VERSION" == *"-"* ]]; then
              TAG=$(echo "$VERSION" | awk -F'-' '{print $2}' | awk -F'.' '{print $1}')
              echo "Using npm tag: $TAG"
              npm publish --tag "$TAG" --provenance
            else
              npm publish --provenance
            fi
          fi
